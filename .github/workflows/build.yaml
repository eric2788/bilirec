name: Build Go Cross Platform

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  artifact_name: bilirec

on:
  release:
    types:
      - created

jobs:
  build_linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [ "amd64", "arm64" ]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      
      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.6

      - name: Add GOPATH bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate swagger docs
        run: swag init -g internal/modules/rest/rest.go -o docs

      - name: Install dependencies
        run: |
          go mod download

      - name: Build Linux
        run: go build -o ./dist/${{ env.artifact_name }}-${{ matrix.goarch }}
        env:
          GOARCH: ${{ matrix.goarch }}

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.artifact_name }}-${{ matrix.goarch }}
          path: 'dist'

  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.6

      - name: Add GOPATH bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate swagger docs
        run: swag init -g internal/modules/rest/rest.go -o docs

      - name: Install dependencies
        run: |
          go mod download

      - name: Build Windows
        run: go build --buildmode=exe -o ./dist/${{ env.artifact_name }}-windows.exe

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.artifact_name }}-windows
          path: 'dist'

  upload_release:
    runs-on: ubuntu-latest
    needs: [ build_windows, build_linux ]
    strategy:
      matrix:
        goarch: [ "amd64", "arm64", "windows" ]
    permissions:
        contents: write
    steps:
      - uses: actions/download-artifact@v6
        id: download
        with:
          name: ${{ env.artifact_name }}-${{ matrix.goarch }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.download.outputs.download-path }}/*
            